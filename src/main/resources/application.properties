spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/homeservicesystem}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret-key=${JWT_SECRET_KEY:YXZlcnlsb25nYW5kc2VjdXJlc2VjcmV0a2V5dGhhdGlzYXRsZWFzdDI1NmJpdHNsb25n}
jwt.expiration-time-ms=${JWT_EXPIRATION_TIME_MS:86400000}

app.base-url=${APP_BASE_URL:http://localhost:8080}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
